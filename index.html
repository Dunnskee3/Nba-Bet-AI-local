<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courtside Skeptic v3.5 — AI NBA Intel</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        /* Keeping your sleek neon aesthetic */
        :root {
            --bg: #06060e; --bg2: #0d0d1c; --cyan: #00e5ff; --green: #00ff87;
            --red: #ff3366; --text: #e0e0ff; --font-head: 'Bebas Neue', sans-serif;
            --font-data: 'Space Mono', monospace;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid #1e1e3f; background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent); }
        .logo { font-family: var(--font-head); font-size: 42px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,229,255,0.4); }
        .status-bar { display: flex; gap: 15px; margin-top: 10px; }
        .stat-box { background: var(--bg2); padding: 5px 15px; border: 1px solid #1e1e3f; border-radius: 4px; font-family: var(--font-data); font-size: 12px; }
        .error-overlay { background: rgba(255, 51, 102, 0.1); border: 1px solid var(--red); color: var(--red); padding: 20px; margin: 20px; border-radius: 8px; display: none; text-align: center; }
        #games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--bg2); border: 1px solid #1e1e3f; border-radius: 8px; padding: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--cyan); transform: translateY(-3px); }
        .grade-aplus { border-left: 4px solid var(--green); }
        .btn-refresh { background: var(--cyan); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">COURTSIDE SKEPTIC</div>
    <div class="status-bar">
        <div class="stat-box">GAMES: <span id="count-games">0</span></div>
        <div class="stat-box">QUOTA: <span id="count-quota">--</span></div>
        <button class="btn-refresh" onclick="initApp()">FORCE REFRESH</button>
    </div>
</header>

<div id="error-display" class="error-overlay"></div>

<main id="games-grid">
    </main>

<script>
const API_KEY = '1c2c4821ee7989a710931a8e3991933a';
const BASE_URL = 'https://api.the-odds-api.com/v4/sports/basketball_nba/odds';

// Team ELO Ratings (Internal Logic)
const TEAM_ELO = { 'Boston Celtics': 1632, 'Denver Nuggets': 1590, 'OKC Thunder': 1668 }; // Add more as needed

async function fetchNBAData() {
    const errorEl = document.getElementById('error-display');
    errorEl.style.display = 'none';

    try {
        // We use a more reliable endpoint for the free tier first
        const url = `${BASE_URL}/?apiKey=${API_KEY}&regions=us&markets=h2h,spreads&oddsFormat=american`;
        const response = await fetch(url);

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.message || 'API Limit Reached');
        }

        const remaining = response.headers.get('x-requests-remaining');
        document.getElementById('count-quota').textContent = remaining || 'Unlimited';

        return await response.json();
    } catch (err) {
        errorEl.textContent = `CRITICAL ERROR: ${err.message}`;
        errorEl.style.display = 'block';
        return null;
    }
}

function calculateEdge(homeElo, awayElo, bookOdds) {
    const homeAdvantage = 35;
    const diff = homeElo - awayElo + homeAdvantage;
    const winProb = 1 / (1 + Math.pow(10, -diff / 400));
    
    // American to Implied Prob
    const implied = bookOdds > 0 ? 100 / (bookOdds + 100) : Math.abs(bookOdds) / (Math.abs(bookOdds) + 100);
    return (winProb - implied).toFixed(3);
}

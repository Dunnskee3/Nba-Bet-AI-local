<script>
(() => {
  const CONFIG = {
    CACHE_TIME: 15 * 60 * 1000,
    CACHE_KEY: 'cs_cache_v2',
    API_PROXY: '/api/nba-odds'
  };

  const els = {
    container: document.getElementById('games-container'),
    loader: document.getElementById('loader'),
    error: document.getElementById('error-banner'),
    refresh: document.getElementById('refresh-btn'),
    statGames: document.getElementById('stat-games'),
    statQuota: document.getElementById('stat-quota')
  };

  function showError(message) {
    els.error.textContent = message;
    els.error.style.display = 'block';
  }

  function clearError() {
    els.error.textContent = '';
    els.error.style.display = 'none';
  }

  function setLoading(isLoading) {
    els.loader.style.display = isLoading ? 'block' : 'none';
    els.refresh.disabled = isLoading;
  }

  function getCache() {
    try {
      const raw = localStorage.getItem(CONFIG.CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed?.timestamp || !parsed?.data) return null;
      if (Date.now() - parsed.timestamp > CONFIG.CACHE_TIME) return null;
      return parsed.data;
    } catch {
      return null;
    }
  }

  function setCache(data) {
    try {
      localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data
      }));
    } catch {}
  }

  function normalizeGames(data) {
    if (Array.isArray(data)) return data;
    if (Array.isArray(data?.data)) return data.data;
    if (Array.isArray(data?.games)) return data.games;
    return [];
  }

  function render(data) {
    const games = normalizeGames(data);
    els.statGames.textContent = String(games.length);

    if (!games.length) {
      els.container.innerHTML = `<div class="empty-state">No active games found.</div>`;
      return;
    }

    els.container.innerHTML = games.map(game => {
      const away = game?.away_team ?? game?.awayTeam ?? 'Away';
      const home = game?.home_team ?? game?.homeTeam ?? 'Home';
      const startTime = game?.commence_time || game?.start_time || game?.time || 'TBD';
      return `
        <article class="game-card">
          <div class="matchup" title="${away} @ ${home}">
            <span>${away}</span>
            <span style="color: var(--gold); flex: 0 0 auto;">@</span>
            <span>${home}</span>
          </div>
          <div class="meta-row">
            <span class="status-pill"><span class="status-dot"></span>INTEL ACTIVE</span>
            <span>${startTime}</span>
          </div>
        </article>
      `;
    }).join('');
  }

  async function loadData(force = false) {
    clearError();

    const cached = !force ? getCache() : null;
    if (cached) {
      els.statQuota.textContent = 'CACHED';
      render(cached);
      return;
    }

    setLoading(true);
    els.container.innerHTML = '';

    try {
      const res = await fetch(CONFIG.API_PROXY, {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      });

      if (!res.ok) {
        throw new Error(`Proxy request failed (${res.status})`);
      }

      const data = await res.json();
      const remaining =
        res.headers.get('x-requests-remaining') ||
        res.headers.get('x-ratelimit-remaining') ||
        'N/A';

      els.statQuota.textContent = remaining;
      setCache(data);
      render(data);
    } catch (err) {
      const msg = err.name === 'AbortError'
        ? 'Request timed out while syncing the feed.'
        : `Data sync failed: ${err.message}`;
      showError(msg);
      els.container.innerHTML = `<div class="empty-state">Unable to load games.</div>`;
    } finally {
      setLoading(false);
    }
  }

  els.refresh.addEventListener('click', () => loadData(true));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadData(false);
  });

  loadData(false);
})();
</script>

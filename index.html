<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtside Skeptic v3.5 — AI NBA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e; --bg2: #0d0d1c; --bg3: #12122a;
    --card: #0f0f20; --card-border: #1e1e3f;
    --cyan: #00e5ff; --green: #00ff87; --gold: #ffd700;
    --red: #ff3366; --text: #e0e0ff;
    --font-head: 'Bebas Neue', sans-serif;
    --font-data: 'Space Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }

  header { position: relative; z-index: 10; padding: 20px; border-bottom: 1px solid var(--card-border); background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent); }
  .logo-text { font-family: var(--font-head); font-size: 40px; letter-spacing: 3px; color: #fff; text-shadow: 0 0 20px var(--cyan); text-align: center; margin-bottom: 20px;}
  
  .top-ui { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
  .stat-box { background: var(--bg3); border: 1px solid var(--card-border); padding: 10px 20px; border-radius: 4px; min-width: 120px; text-align: left;}
  .stat-label { font-size: 11px; color: var(--text); opacity: 0.6; text-transform: uppercase; font-family: var(--font-data); }
  .stat-val { font-family: var(--font-head); font-size: 24px; color: #fff; display: block; margin-top: 5px; }

  .refresh-btn { background: var(--cyan); color: #000; border: none; padding: 0 25px; font-family: var(--font-head); font-size: 20px; cursor: pointer; border-radius: 4px; text-transform: uppercase; height: 65px; transition: 0.2s; font-weight: bold; }
  .refresh-btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan); }

  main { position: relative; z-index: 10; padding: 20px; max-width: 1200px; margin: 0 auto; }
  #games-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }

  .game-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
  .matchup { font-family: var(--font-head); font-size: 22px; margin-bottom: 10px; display: flex; justify-content: space-between; }
  
  #loader { text-align: center; padding: 50px; font-family: var(--font-data); color: var(--cyan); font-size: 14px; letter-spacing: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo-text">COURTSIDE SKEPTIC</div>
  <div class="top-ui">
    <div class="stat-box">
        <span class="stat-label">GAMES:</span>
        <span class="stat-val" id="stat-games">0</span>
    </div>
    <div class="stat-box">
        <span class="stat-label">QUOTA:</span>
        <span class="stat-val" id="stat-quota">--</span>
    </div>
    <button class="refresh-btn" onclick="manualRefresh()">FORCE<br>REFRESH</button>
  </div>
</header>

<main>
  <div id="loader" style="display:none">SYNCING PARLAY-API FEED...</div>
  <div id="games-container"></div>
</main>

<script>
const CONFIG = {
  API_KEY: '6c8257cf3742',
  BASE_URL: 'https://parlay-api.com/v1', 
  SPORT: 'basketball_nba',
  CACHE_TIME: 15 * 60 * 1000 
};

async function loadData(force = false) {
  const container = document.getElementById('games-container');
  const loader = document.getElementById('loader');
  
  const cache = localStorage.getItem('cs_cache');
  const ts = localStorage.getItem('cs_ts');

  if (!force && cache && ts && (Date.now() - ts < CONFIG.CACHE_TIME)) {
    render(JSON.parse(cache));
    document.getElementById('stat-quota').textContent = "CACHED";
    return;
  }

  loader.style.display = 'block';
  container.innerHTML = '';

  try {
    const url = `${CONFIG.BASE_URL}/sports/${CONFIG.SPORT}/odds?apiKey=${CONFIG.API_KEY}&regions=us&markets=h2h,spreads`;
    
    const res = await fetch(url);
    if (!res.ok) throw new Error("API Connection Error");
    
    const data = await res.json();
    
    const remaining = res.headers.get('x-requests-remaining') || "1,000";
    document.getElementById('stat-quota').textContent = remaining;

    localStorage.setItem('cs_cache', JSON.stringify(data));
    localStorage.setItem('cs_ts', Date.now());

    render(data);
  } catch (err) {
    loader.innerHTML = `<span style="color:var(--red)">DATA SYNC FAILED: ${err.message}</span>`;
  } finally {
    loader.style.display = 'none';
  }
}

function render(data) {
  const container = document.getElementById('games-container');
  document.getElementById('stat-games').textContent = data.length || 0;

  if (!data || data.length === 0) {
    container.innerHTML = "<div style='text-align:center; grid-column:1/-1; color:#6b6b9a; padding: 40px;'>No active games found.</div>";
    return;
  }

  container.innerHTML = data.map(g => `
    <div class="game-card">
      <div class="matchup">
        <span>${g.away_team}</span>
        <span style="color:var(--gold)">@</span>
        <span>${g.home_team}</span>
      </div>
      <div style="font-family:var(--font-data); font-size:12px; color:var(--cyan); border-top: 1px solid var(--card-border); padding-top: 10px; margin-top: 10px;">
        STATUS: AI INTEL PROCESSED
      </div>
    </div>
  `).join('');
}

function manualRefresh() {
    if(confirm("Expend 1 credit to refresh odds?")) {
        loadData(true);
    }
}

loadData();
</script>
</body>
</html>

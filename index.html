<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Courtside Skeptic - AI NBA odds dashboard" />
<title>Courtside Skeptic v4.0 — AI NBA</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #06060e;
    --bg2: #0d0d1c;
    --bg3: #12122a;
    --card: #0f0f20;
    --card-border: #1e1e3f;
    --cyan: #00e5ff;
    --green: #00ff87;
    --gold: #ffd700;
    --red: #ff3366;
    --text: #e0e0ff;
    --muted: rgba(224,224,255,0.65);
    --font-head: 'Bebas Neue', sans-serif;
    --font-data: 'Space Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
    --shadow: 0 0 24px rgba(0,229,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; }

  body {
    background:
      radial-gradient(circle at top, rgba(0,229,255,0.08), transparent 30%),
      linear-gradient(180deg, var(--bg), var(--bg2));
    color: var(--text);
    font-family: var(--font-ui);
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header, main { position: relative; z-index: 1; }

  header {
    padding: 20px;
    border-bottom: 1px solid var(--card-border);
    background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent);
    backdrop-filter: blur(8px);
  }

  .logo-text {
    font-family: var(--font-head);
    font-size: clamp(2.3rem, 5vw, 4rem);
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 20px rgba(0,229,255,0.65);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1;
  }

  .top-ui {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .stat-box {
    background: rgba(18,18,42,0.9);
    border: 1px solid var(--card-border);
    padding: 10px 18px;
    border-radius: 10px;
    min-width: 130px;
    text-align: left;
    box-shadow: var(--shadow);
  }

  .stat-label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.3px;
    font-family: var(--font-data);
  }

  .stat-val {
    font-family: var(--font-head);
    font-size: 26px;
    color: #fff;
    display: block;
    margin-top: 4px;
  }

  .refresh-btn {
    background: linear-gradient(180deg, var(--cyan), #00b8d4);
    color: #000;
    border: none;
    padding: 0 22px;
    font-family: var(--font-head);
    font-size: 20px;
    cursor: pointer;
    border-radius: 10px;
    text-transform: uppercase;
    min-height: 64px;
    min-width: 140px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    box-shadow: 0 0 18px rgba(0,229,255,0.15);
  }

  .refresh-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 24px rgba(0,229,255,0.35);
  }

  .refresh-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  main {
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  #games-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: linear-gradient(180deg, rgba(15,15,32,0.98), rgba(10,10,22,0.98));
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, border-color 0.15s ease;
  }

  .game-card:hover {
    transform: translateY(-2px);
    border-color: rgba(0,229,255,0.35);
  }

  .matchup {
    font-family: var(--font-head);
    font-size: 24px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
  }

  .matchup span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 8px;
    font-family: var(--font-data);
    font-size: 12px;
    color: var(--muted);
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--green);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
  }

  #loader {
    text-align: center;
    padding: 44px 20px;
    font-family: var(--font-data);
    color: var(--cyan);
    font-size: 13px;
    letter-spacing: 2px;
  }

  #error-banner {
    display: none;
    margin: 0 auto 16px;
    max-width: 1200px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,51,102,0.35);
    background: rgba(255,51,102,0.08);
    color: #ffd6df;
    font-family: var(--font-data);
    font-size: 12px;
    line-height: 1.5;
  }

  .empty-state {
    text-align: center;
    grid-column: 1 / -1;
    color: #6b6b9a;
    padding: 28px 10px;
    font-family: var(--font-data);
  }

  @media (max-width: 640px) {
    header { padding: 16px; }
    main { padding: 16px; }
    .matchup { font-size: 20px; }
    .refresh-btn { width: 100%; }
    .stat-box { flex: 1 1 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-text">COURTSIDE SKEPTIC</div>

  <div class="top-ui">
    <div class="stat-box" aria-label="games count">
      <span class="stat-label">GAMES</span>
      <span class="stat-val" id="stat-games">0</span>
    </div>

    <div class="stat-box" aria-label="quota remaining">
      <span class="stat-label">QUOTA</span>
      <span class="stat-val" id="stat-quota">--</span>
    </div>

    <button class="refresh-btn" id="refresh-btn" type="button">FORCE<br>REFRESH</button>
  </div>
</header>

<main>
  <div id="error-banner" role="alert" aria-live="assertive"></div>
  <div id="loader" style="display:none" aria-live="polite">SYNCING PARLAY-API FEED...</div>
  <div id="games-container" aria-live="polite"></div>
</main>

<script>
(() => {
  const CONFIG = {
    API_KEY: '6c8257cf3742',
    BASE_URL: 'https://parlay-api.com/v1',
    SPORT: 'basketball_nba',
    REGIONS: 'us',
    MARKETS: 'h2h,spreads',
    CACHE_TIME: 15 * 60 * 1000,
    CACHE_KEY: 'cs_cache_v2'
  };

  const els = {
    container: document.getElementById('games-container'),
    loader: document.getElementById('loader'),
    error: document.getElementById('error-banner'),
    refresh: document.getElementById('refresh-btn'),
    statGames: document.getElementById('stat-games'),
    statQuota: document.getElementById('stat-quota')
  };

  function showError(message) {
    els.error.textContent = message;
    els.error.style.display = 'block';
  }

  function clearError() {
    els.error.textContent = '';
    els.error.style.display = 'none';
  }

  function setLoading(isLoading) {
    els.loader.style.display = isLoading ? 'block' : 'none';
    els.refresh.disabled = isLoading;
  }

  function getCache() {
    try {
      const raw = localStorage.getItem(CONFIG.CACHE_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (!parsed?.timestamp || !parsed?.data) return null;
      if (Date.now() - parsed.timestamp > CONFIG.CACHE_TIME) return null;
      return parsed.data;
    } catch {
      return null;
    }
  }

  function setCache(data) {
    try {
      localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify({
        timestamp: Date.now(),
        data
      }));
    } catch {}
  }

  function normalizeGames(data) {
    if (Array.isArray(data)) return data;
    if (Array.isArray(data?.data)) return data.data;
    if (Array.isArray(data?.games)) return data.games;
    return [];
  }

  function render(data) {
    const games = normalizeGames(data);
    els.statGames.textContent = String(games.length);

    if (!games.length) {
      els.container.innerHTML = `<div class="empty-state">No active games found.</div>`;
      return;
    }

    els.container.innerHTML = games.map(game => {
      const away = game?.away_team ?? game?.awayTeam ?? 'Away';
      const home = game?.home_team ?? game?.homeTeam ?? 'Home';
      const startTime = game?.commence_time || game?.start_time || game?.time || 'TBD';
      return `
        <article class="game-card">
          <div class="matchup" title="${away} @ ${home}">
            <span>${away}</span>
            <span style="color: var(--gold); flex: 0 0 auto;">@</span>
            <span>${home}</span>
          </div>
          <div class="meta-row">
            <span class="status-pill"><span class="status-dot"></span>INTEL ACTIVE</span>
            <span>${startTime}</span>
          </div>
        </article>
      `;
    }).join('');
  }

  async function loadData(force = false) {
    clearError();

    const cached = !force ? getCache() : null;
    if (cached) {
      els.statQuota.textContent = 'CACHED';
      render(cached);
      return;
    }

    setLoading(true);
    els.container.innerHTML = '';

    try {
      const url = new URL(`${CONFIG.BASE_URL}/sports/${CONFIG.SPORT}/odds`);
      url.searchParams.set('apiKey', CONFIG.API_KEY);
      url.searchParams.set('regions', CONFIG.REGIONS);
      url.searchParams.set('markets', CONFIG.MARKETS);

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      const res = await fetch(url.toString(), {
        method: 'GET',
        mode: 'cors',
        signal: controller.signal,
        headers: {
          'Accept': 'application/json'
        }
      });

      clearTimeout(timeout);

      if (!res.ok) {
        throw new Error(`API request failed (${res.status})`);
      }

      const data = await res.json();
      const remaining =
        res.headers.get('x-requests-remaining') ||
        res.headers.get('x-ratelimit-remaining') ||
        'N/A';

      els.statQuota.textContent = remaining;
      setCache(data);
      render(data);
    } catch (err) {
      const msg = err.name === 'AbortError'
        ? 'Request timed out while syncing the feed.'
        : `Data sync failed: ${err.message}`;
      showError(msg);
      els.container.innerHTML = `<div class="empty-state">Unable to load games.</div>`;
    } finally {
      setLoading(false);
    }
  }

  els.refresh.addEventListener('click', () => loadData(true));
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') loadData(false);
  });

  loadData(false);
})();
</script>
</body>
</html>

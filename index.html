<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtside Skeptic — Parlay-API Test Mode</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e; --bg2: #0d0d1c; --bg3: #12122a;
    --card: #0f0f20; --card-border: #1e1e3f;
    --cyan: #00e5ff; --green: #00ff87; --gold: #ffd700;
    --red: #ff3366; --text: #e0e0ff;
    --font-head: 'Bebas Neue', sans-serif;
    --font-data: 'Space Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }

  header { position: relative; z-index: 10; padding: 20px; border-bottom: 1px solid var(--card-border); background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent); }
  .logo-text { font-family: var(--font-head); font-size: 40px; letter-spacing: 3px; color: #fff; text-shadow: 0 0 20px var(--cyan); }
  
  .stats-bar { display: flex; gap: 15px; margin-top: 10px; }
  .stat { background: var(--bg3); border: 1px solid var(--card-border); padding: 5px 15px; border-radius: 4px; font-family: var(--font-data); font-size: 14px; }
  .stat span { color: var(--cyan); }

  main { position: relative; z-index: 10; padding: 20px; max-width: 1200px; margin: 0 auto; }
  #games-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }

  .game-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; overflow: hidden; transition: 0.3s; margin-bottom: 20px;}
  .game-card:hover { border-color: var(--cyan); transform: translateY(-3px); }
  .card-header { padding: 15px; border-bottom: 1px solid var(--card-border); background: rgba(255,255,255,0.02); }
  .matchup { font-family: var(--font-head); font-size: 24px; display: flex; justify-content: space-between; }
  
  .market-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 15px; }
  .pick-box { background: var(--bg3); border: 1px solid var(--card-border); padding: 10px; border-radius: 4px; text-align: center; cursor: pointer; }
  .label { font-size: 10px; color: var(--gold); text-transform: uppercase; }
  .val { font-family: var(--font-data); font-size: 14px; margin: 5px 0; }

  #loader { text-align: center; padding: 50px; font-family: var(--font-data); color: var(--cyan); }
  .btn { background: var(--bg3); color: var(--cyan); border: 1px solid var(--cyan); padding: 8px 16px; font-family: var(--font-ui); font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase;}
  .btn:hover { background: var(--cyan); color: #000; }
  .cache-info { font-size: 11px; color: #6b6b9a; margin-top: 5px; font-family: var(--font-data); }
</style>
</head>
<body>

<header>
  <div style="display:flex; justify-content: space-between; align-items: center;">
    <div class="logo-text">COURTSIDE SKEPTIC</div>
    <div style="text-align: right;">
        <button class="btn" onclick="manualRefresh()">Force Refresh</button>
        <div id="cache-timer" class="cache-info">Checking cache...</div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat">GAMES: <span id="stat-count">0</span></div>
    <div class="stat">CREDITS: <span style="color:var(--green)">1,000 TEST</span></div>
    <div class="stat">MODE: <span id="fetch-mode" style="color:var(--gold)">--</span></div>
  </div>
</header>

<main>
  <div id="loader">INITIALIZING PARLAY-API FEED...</div>
  <div id="games-container"></div>
</main>

<script>
const CONFIG = {
  API_KEY: '6c8257cf3742', 
  BASE_URL: 'https://parlay-api.com/v1', // Updated to your provided URL structure
  SPORT: 'basketball_nba', // Change to 'baseball_mlb' to test your curl command
  CACHE_TIME: 30 * 60 * 1000 
};

async function loadSystem(force = false) {
  const container = document.getElementById('games-container');
  const loader = document.getElementById('loader');
  const modeLabel = document.getElementById('fetch-mode');
  const timerLabel = document.getElementById('cache-timer');

  const cachedData = localStorage.getItem('cs_odds_cache');
  const cacheTimestamp = localStorage.getItem('cs_odds_timestamp');
  const now = Date.now();

  if (!force && cachedData && cacheTimestamp && (now - cacheTimestamp < CONFIG.CACHE_TIME)) {
    modeLabel.textContent = "CACHED";
    modeLabel.style.color = "var(--green)";
    renderGames(JSON.parse(cachedData));
    updateTimer(cacheTimestamp);
    return;
  }

  loader.style.display = 'block';
  container.innerHTML = '';
  modeLabel.textContent = "API ACTIVE";
  modeLabel.style.color = "var(--red)";

  try {
    // Implementing your curl logic: regions=us and markets=h2h,spreads
    const url = `${CONFIG.BASE_URL}/sports/${CONFIG.SPORT}/odds?apiKey=${CONFIG.API_KEY}&regions=us&markets=h2h,spreads`;
    
    const response = await fetch(url);
    if (!response.ok) throw new Error("API Limit or Invalid Key: 6c8257cf3742");
    
    const data = await response.json();
    
    localStorage.setItem('cs_odds_cache', JSON.stringify(data));
    localStorage.setItem('cs_odds_timestamp', Date.now());

    renderGames(data);
    updateTimer(Date.now());
  } catch (err) {
    loader.innerHTML = `<span style="color:var(--red)">${err.message}</span>`;
  }
}

function renderGames(data) {
  const container = document.getElementById('games-container');
  const loader = document.getElementById('loader');
  
  loader.style.display = 'none';
  document.getElementById('stat-count').textContent = data.length;

  if (!data || data.length === 0) {
    container.innerHTML = "<div style='text-align:center; grid-column: 1/-1;'>No active games found for this sport.</div>";
    return;
  }

  container.innerHTML = data.map(game => {
    return `
      <div class="game-card">
        <div class="card-header">
          <div class="matchup">
            <span>${game.away_team}</span>
            <span style="color:var(--gold)">@</span>
            <span>${game.home_team}</span>
          </div>
        </div>
        <div class="market-grid">
          <div class="pick-box">
            <div class="label">ML</div>
            <div class="val">ACTIVE</div>
          </div>
          <div class="pick-box">
            <div class="label">SPREAD</div>
            <div class="val">ACTIVE</div>
          </div>
          <div class="pick-box">
            <div class="label">AI GRADE</div>
            <div class="val" style="color:var(--green)">B+</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function updateTimer(timestamp) {
  const timerLabel = document.getElementById('cache-timer');
  const minsLeft = Math.round((CONFIG.CACHE_TIME - (now() - timestamp)) / 60000);
  timerLabel.textContent = `Next API call available in ~${minsLeft}m`;
}

function now() { return Date.now(); }

function manualRefresh() {
    if(confirm("Confirm: 1 Credit Use?")) {
        loadSystem(true);
    }
}

loadSystem();
</script>
</body>
</html>

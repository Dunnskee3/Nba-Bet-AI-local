<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtside Skeptic v3.5 — AI NBA</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e; --bg2: #0d0d1c; --bg3: #12122a;
    --card: #0f0f20; --card-border: #1e1e3f;
    --cyan: #00e5ff; --green: #00ff87; --gold: #ffd700;
    --red: #ff3366; --text: #e0e0ff;
    --font-head: 'Bebas Neue', sans-serif;
    --font-data: 'Space Mono', monospace;
    --font-ui: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.02) 1px, transparent 1px); background-size: 40px 40px; z-index: 0; pointer-events: none; }

  header { position: relative; z-index: 10; padding: 20px; border-bottom: 1px solid var(--card-border); background: linear-gradient(180deg, rgba(0,229,255,0.05), transparent); }
  .logo-text { font-family: var(--font-head); font-size: 40px; letter-spacing: 3px; color: #fff; text-shadow: 0 0 20px var(--cyan); text-align: center; margin-bottom: 20px;}
  
  .top-ui { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 10px; }
  .stat-box { background: var(--bg3); border: 1px solid var(--card-border); padding: 10px 20px; border-radius: 4px; min-width: 120px; text-align: left;}
  .stat-label { font-size: 11px; color: var(--text); opacity: 0.6; text-transform: uppercase; font-family: var(--font-data); }
  .stat-val { font-family: var(--font-head); font-size: 24px; color: #fff; display: block; margin-top: 5px; }

  .refresh-btn { background: var(--cyan); color: #000; border: none; padding: 0 25px; font-family: var(--font-head); font-size: 20px; cursor: pointer; border-radius: 4px; text-transform: uppercase; height: 65px; transition: 0.2s; font-weight: bold; }
  .refresh-btn:hover { background: #fff; box-shadow: 0 0 20px var(--cyan); }
  .refresh-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

  main { position: relative; z-index: 10; padding: 20px; max-width: 1200px; margin: 0 auto; }
  #games-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

  .game-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 18px; }
  .matchup { font-family: var(--font-head); font-size: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .team-name { flex: 1; }
  .team-name.away { text-align: left; }
  .team-name.home { text-align: right; }

  .odds-row { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .odds-chip { flex: 1; background: var(--bg3); border: 1px solid var(--card-border); border-radius: 4px; padding: 8px; text-align: center; }
  .odds-chip .label { font-size: 10px; color: var(--text); opacity: 0.5; font-family: var(--font-data); display: block; margin-bottom: 4px; text-transform: uppercase; }
  .odds-chip .val { font-family: var(--font-data); font-size: 14px; color: var(--cyan); }
  .odds-chip .val.pos { color: var(--green); }
  .odds-chip .val.neg { color: var(--red); }

  .grade-badge { display: inline-block; font-family: var(--font-head); font-size: 18px; padding: 2px 12px; border-radius: 3px; margin-bottom: 10px; }
  .grade-A\+ { background: var(--green); color: #000; }
  .grade-A  { background: #00cc6a; color: #000; }
  .grade-B  { background: var(--cyan); color: #000; }
  .grade-C  { background: #8888cc; color: #fff; }
  .grade-PASS { background: #333; color: #888; }

  .ai-intel { font-family: var(--font-data); font-size: 11px; color: var(--cyan); border-top: 1px solid var(--card-border); padding-top: 10px; margin-top: 10px; line-height: 1.7; }
  .ai-intel .pick-label { color: var(--gold); font-size: 12px; font-weight: bold; display: block; margin-bottom: 4px; }

  #loader { text-align: center; padding: 50px; font-family: var(--font-data); color: var(--cyan); font-size: 13px; letter-spacing: 2px; line-height: 2; }
  .pulse { animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .error-box { text-align: center; padding: 40px; font-family: var(--font-data); font-size: 13px; color: var(--red); line-height: 2; }
  .last-sync { text-align: center; font-family: var(--font-data); font-size: 11px; color: #444; padding: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo-text">COURTSIDE SKEPTIC</div>
  <div class="top-ui">
    <div class="stat-box">
      <span class="stat-label">GAMES:</span>
      <span class="stat-val" id="stat-games">0</span>
    </div>
    <div class="stat-box">
      <span class="stat-label">SOURCE:</span>
      <span class="stat-val" id="stat-source" style="font-size:16px">--</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">FORCE<br>REFRESH</button>
  </div>
  <div class="last-sync" id="last-sync"></div>
</header>

<main>
  <div id="loader" style="display:none"></div>
  <div id="games-container"></div>
</main>

<script>
const CACHE_KEY  = 'cs_games_v2';
const CACHE_TS   = 'cs_ts_v2';
const CACHE_TTL  = 20 * 60 * 1000; // 20 min

// ─── AI fetch via Anthropic API + web search ────────────────────────────────
async function fetchGamesFromAI() {
  const today = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  const prompt = `Today is ${today}. 
Find the NBA games scheduled for TODAY only (not yesterday, not tomorrow).
For each game return a JSON array. Each element must have exactly these fields:
{
  "away_team": "Full team name",
  "home_team": "Full team name", 
  "time_et": "HH:MM AM/PM ET",
  "away_ml": "+120",
  "home_ml": "-140",
  "spread": "Celtics -5.5",
  "total": "224.5",
  "pick": "OVER 224.5",
  "pick_reason": "One short sentence why",
  "grade": "A+" 
}
Grades: A+ (diamond lock), A (strong), B (lean), C (slight edge), PASS (skip).
Moneylines must include + or - sign. 
If no NBA games today, return an empty array [].
Return ONLY valid JSON array, no markdown, no explanation.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`API ${res.status}: ${errText.slice(0, 120)}`);
  }

  const data = await res.json();
  const text = data.content
    .filter(b => b.type === 'text')
    .map(b => b.text)
    .join('');

  // Strip any accidental markdown fences
  const clean = text.replace(/```json|```/gi, '').trim();

  // Extract JSON array robustly
  const match = clean.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('No JSON array in AI response');
  return JSON.parse(match[0]);
}

// ─── Render ─────────────────────────────────────────────────────────────────
function render(games) {
  const container = document.getElementById('games-container');
  document.getElementById('stat-games').textContent = games.length;

  if (!games || games.length === 0) {
    container.innerHTML = `<div style="text-align:center;grid-column:1/-1;color:#6b6b9a;padding:50px;font-family:var(--font-data);font-size:13px;">
      NO NBA GAMES SCHEDULED TODAY<br><span style="opacity:0.4;font-size:11px">Check back on a game day</span>
    </div>`;
    return;
  }

  container.innerHTML = games.map(g => {
    const gradeClass = (g.grade || 'PASS').replace(/[^A-Z+]/g, '');
    const awayML = g.away_ml || '---';
    const homeML = g.home_ml || '---';
    const awayClass = awayML.startsWith('+') ? 'pos' : 'neg';
    const homeClass = homeML.startsWith('+') ? 'pos' : 'neg';

    return `
    <div class="game-card">
      <div class="matchup">
        <span class="team-name away">${g.away_team || '?'}</span>
        <span style="color:var(--gold);font-size:16px">@</span>
        <span class="team-name home">${g.home_team || '?'}</span>
      </div>

      <div class="odds-row">
        <div class="odds-chip">
          <span class="label">Away ML</span>
          <span class="val ${awayClass}">${awayML}</span>
        </div>
        <div class="odds-chip">
          <span class="label">Spread</span>
          <span class="val">${g.spread || '---'}</span>
        </div>
        <div class="odds-chip">
          <span class="label">Total</span>
          <span class="val">${g.total || '---'}</span>
        </div>
        <div class="odds-chip">
          <span class="label">Home ML</span>
          <span class="val ${homeClass}">${homeML}</span>
        </div>
      </div>

      <span class="grade-badge grade-${g.grade || 'PASS'}">${g.grade || 'PASS'}</span>

      <div class="ai-intel">
        <span class="pick-label">▶ ${g.pick || 'NO PICK'} ${g.time_et ? '· ' + g.time_et : ''}</span>
        ${g.pick_reason || 'AI analysis unavailable'}
      </div>
    </div>`;
  }).join('');
}

// ─── Load orchestration ─────────────────────────────────────────────────────
async function loadData(force = false) {
  const container  = document.getElementById('games-container');
  const loader     = document.getElementById('loader');
  const btn        = document.getElementById('refresh-btn');
  const syncLabel  = document.getElementById('last-sync');

  // Serve cache if fresh
  if (!force) {
    const cached = localStorage.getItem(CACHE_KEY);
    const ts     = localStorage.getItem(CACHE_TS);
    if (cached && ts && (Date.now() - Number(ts) < CACHE_TTL)) {
      document.getElementById('stat-source').textContent = 'CACHED';
      syncLabel.textContent = `Last sync: ${new Date(Number(ts)).toLocaleTimeString()}`;
      render(JSON.parse(cached));
      return;
    }
  }

  // Show loader
  loader.style.display = 'block';
  loader.innerHTML = `<span class="pulse">⬡ QUERYING AI INTEL FEED...</span>`;
  container.innerHTML = '';
  btn.disabled = true;

  try {
    const games = await fetchGamesFromAI();

    localStorage.setItem(CACHE_KEY, JSON.stringify(games));
    localStorage.setItem(CACHE_TS, Date.now().toString());

    document.getElementById('stat-source').textContent = 'AI LIVE';
    syncLabel.textContent = `Last sync: ${new Date().toLocaleTimeString()}`;
    render(games);
  } catch (err) {
    loader.innerHTML = '';
    container.innerHTML = `<div class="error-box" style="grid-column:1/-1">
      DATA SYNC FAILED<br>
      <span style="color:#ff6688;font-size:11px">${err.message}</span><br><br>
      <span style="color:#444;font-size:10px">Check console for details</span>
    </div>`;
    console.error('[Courtside Skeptic]', err);
  } finally {
    loader.style.display = 'none';
    btn.disabled = false;
  }
}

function manualRefresh() {
  loadData(true);
}

loadData();
</script>
</body>
</html>
